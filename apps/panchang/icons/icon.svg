<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Rich Saffron Gradient Background -->
    <linearGradient id="bgSaffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#E87C1E"/>
      <stop offset="100%" stop-color="#CC5D00"/>
    </linearGradient>

    <!-- Sunburst / Divine Glow Effect -->
    <radialGradient id="divineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255, 230, 200, 0.4)"/>
      <stop offset="60%" stop-color="rgba(255, 180, 100, 0.1)"/>
      <stop offset="100%" stop-color="rgba(255, 153, 51, 0)"/>
    </radialGradient>

    <!-- Drop shadow for the Om symbol to lift it off the gradient -->
    <filter id="omShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7A3800" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base App Icon Shape (Rounded Square) -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgSaffron)"/>

  <!-- Centered Burst Glow -->
  <circle cx="512" cy="512" r="480" fill="url(#divineGlow)"/>

